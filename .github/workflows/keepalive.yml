# keep-alive — ping the Render deployment every 10 minutes so the free-tier
# service never idles past its 15-minute sleep threshold. Visitors then never
# see Render's cold-start "Not Found".
#
# The retry loop also covers the wake-up case: if the service HAS just gone to
# sleep, the first hit returns the edge 404 (and triggers spin-up), and a retry
# ~20s later confirms it is back to 200.
name: keep-alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}   # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping chat relay
        run: |
          url='https://secure-chat-vq14.onrender.com/'
          code=000
          for i in 1 2 3 4; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 60 "$url" || echo 000)
            echo "attempt $i -> HTTP $code"
            [ "$code" = "200" ] && break
            sleep 20
          done
          [ "$code" = "200" ]   # fail the job (and notify) if it never came up
